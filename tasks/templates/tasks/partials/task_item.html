<div id="task-{{ task.id }}">
    <input type="checkbox" disabled {% if task.completed %}checked{% endif %}>
    <span {% if task.completed %}style="text-decoration: line-through;"{% endif %}>
        {{ task.title }}
    </span>
    <button 
    hx-delete="{% url 'delete_task' task.id %}"
    hx-target="#task-{{ task.id }}"
    hx-swap="outerHTML"
    hx-confirm="Delete this task?"
>
    ❌
</button>
    <button 
    hx-get="{% url 'edit_task' task.id %}"
    hx-target="#task-{{ task.id }}"
    hx-swap="outerHTML">
    ✏️
</button>
</div>
