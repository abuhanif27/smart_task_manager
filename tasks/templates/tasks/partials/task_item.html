<div id="task-{{ task.id }}">
    {{ task.title }}
    <button 
        hx-delete="{% url 'delete_task' task.id %}"
        hx-target="#task-{{ task.id }}"
        hx-swap="outerHTML"
        hx-confirm="Are you sure?">
        ❌
    </button>
    <button 
    hx-get="{% url 'edit_task' task.id %}"
    hx-target="#task-{{ task.id }}"
    hx-swap="outerHTML">
    ✏️
</button>
</div>
