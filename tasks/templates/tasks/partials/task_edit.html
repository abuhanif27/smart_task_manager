<div class="task-edit-card" id="task-{{ task.id }}">
    <form class="edit-form"
          hx-post="{% url 'update_task' task.id %}"
          hx-target="#task-{{ task.id }}"
          hx-swap="outerHTML">
        <input type="text" class="edit-input" name="title" value="{{ task.title }}" autocomplete="off" autofocus>
        <label class="edit-completed-wrap">
            <input type="checkbox" name="completed" {% if task.completed %}checked{% endif %}>
            Done
        </label>
        <button type="submit" class="edit-save-btn">Save</button>
    </form>
</div>
