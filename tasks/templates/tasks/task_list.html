<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0b09;
            --surface: #161310;
            --card: #1c1916;
            --card-hover: #231f1b;
            --border: #2b2722;
            --border-focus: #4c3f2e;
            --accent: #c49a45;
            --accent-hover: #d4aa55;
            --accent-muted: rgba(196,154,69,.12);
            --accent-glow: rgba(196,154,69,.06);
            --text: #ede8df;
            --text-muted: #7d766c;
            --text-dim: #4a4540;
            --danger-bg: rgba(163,52,40,.12);
            --danger-text: #e55a4a;
            --radius: 12px;
            --radius-sm: 8px;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --ease: cubic-bezier(.4,0,.2,1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(196,154,69,.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 56px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .header-eyebrow {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 58px;
            font-weight: 600;
            line-height: 1;
            color: var(--text);
            letter-spacing: -.02em;
        }

        .header-title em {
            font-style: italic;
            font-weight: 400;
            color: var(--text-muted);
        }

        .header-meta {
            text-align: right;
            padding-bottom: 6px;
        }

        .header-weekday {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .header-date {
            font-size: 12px;
            color: var(--text-dim);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 28px;
        }

        /* ── Controls ───────────────────────────── */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            width: 15px;
            height: 15px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 12px 9px 35px;
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
        }

        .search-input::placeholder { color: var(--text-dim); }

        .search-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .filter-tabs {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 3px;
            gap: 2px;
        }

        .tab {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 180ms var(--ease);
        }

        .tab:hover { color: var(--text); background: var(--card); }

        .tab.active {
            background: var(--accent);
            color: #0d0b09;
            font-weight: 600;
        }

        /* ── Add form ───────────────────────────── */
        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 16px;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
        }

        .add-input::placeholder { color: var(--text-dim); }

        .add-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-muted);
        }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #0d0b09;
            border: none;
            border-radius: var(--radius-sm);
            padding: 11px 20px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 200ms var(--ease);
        }

        .add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(196,154,69,.25);
        }

        .add-btn:active { transform: none; box-shadow: none; }
        .add-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ── Loading ────────────────────────────── */
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 1px;
            margin-bottom: 6px;
        }

        .htmx-request .htmx-indicator,
        .htmx-indicator.htmx-request { opacity: 1; }

        /* ── Task list ──────────────────────────── */
        #task-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-height: 40px;
        }

        /* ── Task card (shared with partial) ────── */
        .task-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 200ms var(--ease), background 200ms var(--ease);
            position: relative;
            animation: fadeSlide 240ms var(--ease) both;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            opacity: 0;
            transition: opacity 200ms var(--ease);
        }

        .task-card:hover { border-color: var(--border-focus); background: var(--card-hover); }
        .task-card:hover::before { opacity: 1; }
        .task-card.task-done { opacity: .42; }
        .task-card.task-done::before { opacity: 0 !important; }

        /* ── Checkbox ───────────────────────────── */
        .checkbox-wrap {
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .checkbox-wrap input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .checkmark {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1.5px solid var(--border-focus);
            background: transparent;
            transition: all 200ms var(--ease);
            flex-shrink: 0;
        }

        .checkbox-wrap:hover .checkmark { border-color: var(--accent); background: var(--accent-muted); }

        .checkbox-wrap input:checked ~ .checkmark { background: var(--accent); border-color: var(--accent); }

        .checkmark svg {
            width: 11px;
            height: 11px;
            color: #0d0b09;
            opacity: 0;
            transform: scale(.5);
            transition: all 180ms var(--ease);
        }

        .checkbox-wrap input:checked ~ .checkmark svg { opacity: 1; transform: scale(1); }

        /* ── Task title ─────────────────────────── */
        .task-title {
            flex: 1;
            font-size: 14px;
            font-weight: 400;
            color: var(--text);
            line-height: 1.4;
        }

        .task-done .task-title { text-decoration: line-through; color: var(--text-muted); }

        /* ── Task actions ───────────────────────── */
        .task-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 150ms var(--ease);
        }

        .task-card:hover .task-actions { opacity: 1; }

        .task-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            cursor: pointer;
            transition: all 150ms var(--ease);
            color: var(--text-dim);
        }

        .task-btn:hover { background: var(--surface); color: var(--text-muted); }
        .task-btn-delete:hover { background: var(--danger-bg); color: var(--danger-text); }
        .task-btn svg { width: 14px; height: 14px; }

        /* ── Edit card (shared with partial) ────── */
        .task-edit-card {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: 0 0 0 3px var(--accent-muted);
            animation: fadeSlide 200ms var(--ease) both;
        }

        .edit-form { display: flex; align-items: center; gap: 8px; }

        .edit-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border-focus);
            border-radius: var(--radius-sm);
            padding: 7px 10px;
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease);
        }

        .edit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-muted); }

        .edit-completed-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .edit-completed-wrap input[type="checkbox"] {
            accent-color: var(--accent);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .edit-save-btn {
            background: var(--accent);
            color: #0d0b09;
            border: none;
            border-radius: var(--radius-sm);
            padding: 7px 14px;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 150ms var(--ease);
        }

        .edit-save-btn:hover { background: var(--accent-hover); }

        /* ── Empty state ────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 56px 24px;
            animation: fadeSlide 280ms var(--ease) both;
        }

        .empty-icon {
            margin: 0 auto 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
        }

        .empty-icon svg { width: 20px; height: 20px; }
        .empty-state p { font-size: 13px; color: var(--text-dim); }

        /* ── Toast ──────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--card);
            border: 1px solid var(--border-focus);
            border-radius: var(--radius);
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
            transform: translateY(80px);
            opacity: 0;
            transition: all 280ms var(--ease);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

<div class="container">

    <header class="header">
        <div>
            <p class="header-eyebrow">Smart</p>
            <h1 class="header-title">Task<em>s</em></h1>
        </div>
        <div class="header-meta">
            <div class="header-weekday" id="js-weekday"></div>
            <div class="header-date" id="js-date"></div>
        </div>
    </header>

    <div class="divider"></div>

    <div class="controls">
        <div class="search-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
                type="text"
                class="search-input"
                name="q"
                placeholder="Search tasks..."
                hx-get="{% url 'search_tasks' %}"
                hx-target="#task-list"
                hx-trigger="keyup changed delay:500ms"
                autocomplete="off"
            >
        </div>
        <div class="filter-tabs">
            <button class="tab active"
                hx-get="{% url 'filter_tasks' %}?status=all"
                hx-target="#task-list"
                onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">All</button>
            <button class="tab"
                hx-get="{% url 'filter_tasks' %}?status=active"
                hx-target="#task-list"
                onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">Active</button>
        </div>
    </div>

    <form class="add-form"
          hx-post="{% url 'add_task' %}"
          hx-target="#task-list"
          hx-swap="beforeend"
          hx-on="htmx:afterRequest: this.reset()"
          hx-indicator="#loading">
        {% csrf_token %}
        <input type="text" class="add-input" name="title" placeholder="What needs to be done?" required autocomplete="off">
        <button type="submit" class="add-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            Add task
        </button>
    </form>

    <div id="loading" class="htmx-indicator"></div>

    <div id="task-list">
        {% for task in tasks %}
            {% include "tasks/partials/task_item.html" %}
        {% empty %}
            <div class="empty-state">
                <div class="empty-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
                <p>No tasks yet — add one above to get started.</p>
            </div>
        {% endfor %}
    </div>

</div>

<div id="toast" class="toast">
    <span class="toast-dot"></span>
    Task added
</div>

<script>
    const d = new Date();
    document.getElementById('js-weekday').textContent = d.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('js-date').textContent = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    document.body.addEventListener('taskAdded', function () {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2600);
    });
</script>

</body>
</html>
