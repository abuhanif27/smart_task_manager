<!-- task_list.html -->
<!DOCTYPE html>
<html>
<head>
    <title>HTMX Tasks</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-on="taskAdded: document.getElementById('messages').innerHTML = '✅ Task added!'">

<h1>Task Manager ⚡</h1>

<input 
    type="text" 
    name="q"
    placeholder="Search tasks..."
    hx-get="{% url 'search_tasks' %}"
    hx-target="#task-list"
    hx-trigger="keyup changed delay:500ms"
>

<div>
    <button 
        hx-get="{% url 'filter_tasks' %}?status=all"
        hx-target="#task-list">
        All
    </button>

    <button 
        hx-get="{% url 'filter_tasks' %}?status=active"
        hx-target="#task-list">
        Active
    </button>
</div>

<div id="loading" style="display:none;">
    ⏳ Loading...
</div>

<div id="messages"></div>

<!-- Form -->
<form hx-post="{% url 'add_task' %}" 
      hx-target="#task-list" 
      hx-swap="beforeend"
      hx-on="htmx:afterRequest: this.reset()"
      hx-indicator="#loading">
    {% csrf_token %}
    
    <input type="text" name="title" placeholder="Enter task" required>
    <button type="submit">Add</button>
</form>

<hr>

<!-- Task List -->
<div id="task-list">
    {% for task in tasks %}
        {% include "tasks/partials/task_item.html" %}
    {% endfor %}
</div>

</body>
</html>
